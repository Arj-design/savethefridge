name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_SPOONACULAR_API_KEY: ${{ secrets.VITE_SPOONACULAR_API_KEY }}
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Verify web assets were copied
        run: |
          echo "=== Assets folder contents ==="
          ls -la android/app/src/main/assets/ || echo "Assets folder missing!"
          ls -la android/app/src/main/assets/public/ || echo "Public folder missing!"
          echo "=== APK web asset count ==="
          find android/app/src/main/assets/public -type f | wc -l || echo "0 files found"
          
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: savethefridge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
